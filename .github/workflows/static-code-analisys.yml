name: "Static Code Analysis Recipe"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

env:
  CODEQL_ENABLED: 1  # Set to '1' to enable CodeQL analysis, '0' to disable

jobs:
  analyze:
    name: Analyze (${{ matrix.os }}, ${{ matrix.config }})
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        config: ['Debug', 'Release']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check code formatting
        uses: ./.github/actions/check-formatting

      - name: Setup build environment
        uses: ./.github/actions/setup-cpp-tools

      - name: Initialize CodeQL
        if: env.CODEQL_ENABLED == '1'
        uses: github/codeql-action/init@v4
        with:
          languages: cpp

      - name: Configure CMake
        uses: ./.github/actions/configure-cmake
        with:
          config: ${{ matrix.config }}

      - name: Build project
        uses: ./.github/actions/build-project
        with:
          config: ${{ matrix.config }}

      - name: Verify compilation database
        shell: pwsh
        run: |
          if (-not (Test-Path "build/compile_commands.json")) {
              Write-Host "ERROR: compile_commands.json not found!" -ForegroundColor Red
              exit 1
          }
          Write-Host "Found $(((Get-Content build/compile_commands.json | ConvertFrom-Json).Count)) entries in compilation database"

      - name: Run clang-tidy
        uses: ./.github/actions/run-clang-tidy
        with:
          build-dir: build

      - name: Perform CodeQL Analysis
        if: env.CODEQL_ENABLED == '1'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp/os:${{ matrix.os }}/config:${{ matrix.config }}"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}-${{ matrix.config }}
          path: |
            **/*.log
            build/**/*.log
          retention-days: 7

      - name: Upload compile_commands.json
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands-${{ matrix.os }}-${{ matrix.config }}
          path: build/compile_commands.json
          retention-days: 7