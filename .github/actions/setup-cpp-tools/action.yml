name: 'Setup C++ Build Environment'
description: 'Installs clang-tidy, ninja, and configures build environment'

runs:
  using: 'composite'
  steps:
    - name: Setup MSVC environment
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '17.0'

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=20.1.8 -y
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        clang-tidy --version
        ninja --version

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Add LLVM 20 official repository
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main" -y
        sudo apt-get update
        
        # Install LLVM 20 tools
        sudo apt-get install -y clang-tidy-20 clang-20 ninja-build
        
        # Set as default (force update-alternatives)
        sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-20 100
        sudo update-alternatives --set clang-tidy /usr/bin/clang-tidy-20
        
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
        sudo update-alternatives --set clang /usr/bin/clang-20
        
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
        sudo update-alternatives --set clang++ /usr/bin/clang++-20
        
        # Verify versions
        echo "=== Installed versions ==="
        clang-tidy --version
        clang++ --version
        ninja --version