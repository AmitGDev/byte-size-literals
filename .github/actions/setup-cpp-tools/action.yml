name: 'Setup C++ Build Environment'
description: 'Installs clang-tidy, ninja, and configures build environment'
runs:
  using: 'composite'
  steps:
    - name: Setup MSVC environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        LLVM_VERSION: '22.1.0'
      run: |
        $ErrorActionPreference = 'Stop'

        # Install LLVM directly from GitHub releases
        $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe"
        Invoke-WebRequest -Uri $url -OutFile "llvm-installer.exe"
        Start-Process -FilePath "llvm-installer.exe" -ArgumentList "/S" -Wait

        # Add to PATH for this step and subsequent steps
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        $env:PATH = "C:\Program Files\LLVM\bin;$env:PATH"

        # Verify versions
        echo "=== Installed versions (Windows) ==="
        cl 2>&1 | ForEach-Object { "$_" } | Where-Object { $_ -imatch "Version" } | Select-Object -First 1
        ninja --version
        clang-format --version
        clang-tidy --version

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        LLVM_VERSION: '22.1.0'
      run: |
        # Install LLVM directly from GitHub releases
        echo "Downloading LLVM ${LLVM_VERSION}..."
        curl -fsSL -o LLVM-${LLVM_VERSION}-Linux-X64.tar.xz \
          https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/LLVM-${LLVM_VERSION}-Linux-X64.tar.xz
        echo "Download complete."
        tar -xf LLVM-${LLVM_VERSION}-Linux-X64.tar.xz
        sudo mv LLVM-${LLVM_VERSION}-Linux-X64 /usr/local/llvm

        # Add to PATH for this step and subsequent steps
        echo "/usr/local/llvm/bin" >> $GITHUB_PATH
        export PATH="/usr/local/llvm/bin:$PATH"

        # Install ninja
        sudo apt-get install -y -qq -o Dpkg::Use-Pty=0 ninja-build

        # Verify versions
        echo "=== Installed versions (Linux) ==="
        clang++ --version
        ninja --version
        clang-format --version
        clang-tidy --version
